include: package:flutter_lints/flutter.yaml
analyzer:
  plugins:
    - riverpod_lint
  errors:
    avoid_print: ignore
    empty_catches: ignore
    avoid_catches_without_on_clauses: ignore
    unused_catch_clause: ignore
    dead_code_on_catch_subtype: ignore
linter:
  rules:
    - use_build_context_synchronously
