include: package:flutter_lints/flutter.yaml

analyzer:
  plugins:
    - riverpod_lint
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    avoid_print: ignore
    unnecessary_import: ignore
    unused_catch_clause: ignore

linter:
  rules:
    - prefer_final_locals
    - use_super_parameters
    - use_build_context_synchronously
