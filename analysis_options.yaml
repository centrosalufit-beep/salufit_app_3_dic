include: package:very_good_analysis/analysis_options.yaml
analyzer:
  plugins: [riverpod_lint]
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    invalid_annotation_target: ignore
    avoid_print: ignore
    use_setters_to_change_properties: ignore
    sort_pub_dependencies: ignore
    unawaited_futures: ignore
  exclude:
    # Archivos autogenerados — los linter warnings que reportan son del
    # generator (freezed / json_serializable / riverpod_generator), no
    # nuestros, y se regenerarían si los editáramos.
    - "**/*.g.dart"
    - "**/*.freezed.dart"
linter:
  rules:
    public_member_api_docs: false
    lines_longer_than_80_chars: false
    require_trailing_commas: true
    prefer_const_constructors: true
